services:
  postgres:
    image: postgres:16
    container_name: movieflix-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - movieflix-db-data:/var/lib/postgresql/data

volumes:
  movieflix-db-data:
