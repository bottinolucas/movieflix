spring:
  application:
    name: movieflix
  
  # Conexao do Banco de Dados
  datasource:
    url: jdbc:postgresql://localhost:5432/movieflix
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # Avisa pro Hibernate qual dialeto de banco de dados vamos usar (Nesse caso: Postgres)
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  # Ativa migracoes
  flyway:
    enabled: true
